<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Expense Tracker</title>
  </head>
  <body>
    <div class="container">
      <h1>Expense Tracker</h1>
      <div class="expense-info">
        <h4>Your Balance</h4>
        <h1 class="total-balance" id="total-balance">$0.00</h1>
        <div class="low-balance" id="low-balance">
          Your balance is running low.
        </div>
        <div class="expense-summary">
          <div class="expense-box income">
            <h3>Income</h3>
            <h2 id="total-income">$0.00</h2>
          </div>
          <div class="expense-box expenses">
            <h3>Expenses</h3>
            <h2 id="total-expenses">$0.00</h2>
          </div>
        </div>
      </div>

      <div class="expense-detail">
        <div class="transaction-container">
          <h3>Transactions</h3>
          <ul class="transaction-list" id="transaction-list">
            <!-- TRANSACTIONS WILL BE INSERTED HERE -->
          </ul>
        </div>
        <div class="form-container">
          <h3>Add Transaction</h3>
          <form class="form" id="form">
            <div class="form-group">
              <label for="description">Description</label>
              <input
                id="description"
                type="text"
                placeholder="Enter description..."
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label for="amount">Amount</label>
              <input id="amount" type="number" placeholder="Enter amount..." />
              <div class="notes">Use negative (-) for expenses</div>
            </div>

            <button type="submit">Add Transaction</button>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
